<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="darkbloomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background Outer Ring -->
  <circle cx="100" cy="120" r="85" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Large Outer Hexagon -->
  <polygon points="100,20 160,55 160,125 100,160 40,125 40,55" fill="url(#darkbloomGrad)" stroke="url(#accentGrad)" stroke-width="3"/>

  <!-- Middle Hexagon -->
  <polygon points="100,45 145,71 145,109 100,135 55,109 55,71" fill="none" stroke="#e94560" stroke-width="2" opacity="0.7"/>

  <!-- Inner Hexagon (Detailed) -->
  <polygon points="100,65 130,82 130,108 100,125 70,108 70,82" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>

  <!-- Center Diamond / The Bloom -->
  <polygon points="100,78 118,100 100,122 82,100" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Center Dot (Core) -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.9"/>

  <!-- Bridge Connection Lines -->
  <line x1="160" y1="100" x2="200" y2="100" stroke="url(#bridgeGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="100" x2="0" y2="100" stroke="url(#bridgeGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="160" x2="100" y2="200" stroke="url(#bridgeGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="20" x2="100" y2="0" stroke="url(#bridgeGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Diagonal Connections -->
  <line x1="48" y1="60" x2="20" y2="40" stroke="url(#bridgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="152" y1="60" x2="180" y2="40" stroke="url(#bridgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="140" x2="20" y2="160" stroke="url(#bridgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="152" y1="140" x2="180" y2="160" stroke="url(#bridgeGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Main Text: DARKBLOOM -->
  <text x="240" y="110" font-family="'Impact', 'Arial Black', sans-serif" font-size="64" font-weight="900" fill="#1a1a2e" letter-spacing="8">DARKBLOOM</text>

  <!-- Subtitle Text: INDUSTRIES -->
  <text x="240" y="150" font-family="'Arial', sans-serif" font-size="28" font-weight="700" fill="#0f3460" letter-spacing="12">INDUSTRIES</text>

  <!-- Tagline -->
  <text x="240" y="180" font-family="'Arial', sans-serif" font-size="14" font-weight="400" fill="#666666" letter-spacing="4">BUILT FOR THE FUTURE. HARDENED FOR THE BATTLEFIELD.</text>

  <!-- Trademark Symbol -->
  <text x="710" y="95" font-family="'Arial', sans-serif" font-size="20" fill="#e94560" opacity="0.8" font-weight="bold">™</text>
</svg>